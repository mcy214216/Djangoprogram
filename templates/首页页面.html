<!DOCTYPE html>
<html>
<head>
    <title>默认页面</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .welcome-container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            max-width: 500px;
        }
        h1 {
            color: #333;
            margin-bottom: 20px;
            font-size: 2.5em;
        }
        p {
            color: #666;
            font-size: 1.2em;
            line-height: 1.6;
        }
        .emoji {
            font-size: 3em;
            margin-bottom: 20px;
        }
        .navigation {
            margin: 30px 0;
        }
        .navigation a {
            display: inline-block;
            margin: 0 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .navigation a:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="welcome-container">
        <div class="emoji">👋</div>
        <h1>Hello, Welcome!</h1>
        <p>很高兴见到您！</p>
        <p>这是我们的自定义欢迎页面</p>

        <div class="navigation">
            <a href="login/">登入界面</a>
        </div>
            <div class="feature-card">
            <h3><i class="fas fa-globe"></i> 公共相册</h3>
            <p>查看所有人分享的照片，发现美好瞬间</p>
             <div class="navigation"><a href="{% url 'public_gallery' %}" class="btn">
               进入公共相册</a></div>
             </div>


        <p><small>基于 Django 框架构建</small></p>
    </div>
</body>
</html>
